get_cic_insights:
  name: Get CIC insights
  description: Retrieves insights data for a specific time period from the Quatt installation. The end date is automatically calculated based on the from_date and timeframe.
  fields:
    from_date:
      name: From date
      description: Start date for insights data in ISO format (YYYY-MM-DD).
      example: "2024-01-01"
      default: "2020-01-01"
      selector:
        text:
    timeframe:
      name: Timeframe
      description: The timeframe granularity for the insights data. The API automatically calculates the end date based on the from_date and this timeframe.
      default: "all"
      example: "all"
      selector:
        select:
          options:
            - "all"
            - "day"
            - "week"
            - "month"
            - "year"
    advanced_insights:
      name: Advanced insights
      description: Whether to include advanced insights data.
      default: true
      selector:
        boolean:

get_home_battery_insights:
  name: Get home battery insights
  description: Retrieves home battery insights (15-minute timeseries) from the Quatt mobile API. Without year/month/day, returns today's insights. Provide all three to fetch a specific date.
  fields:
    year:
      name: Year
      description: Year for the specific-date endpoint (e.g. 2026). Requires month and day too.
      example: 2026
      selector:
        number:
          min: 2020
          max: 2100
          mode: box
    month:
      name: Month
      description: Month (1-12) for the specific-date endpoint. Requires year and day too.
      example: 4
      selector:
        number:
          min: 1
          max: 12
          mode: box
    day:
      name: Day
      description: Day of month (1-31) for the specific-date endpoint. Requires year and month too.
      example: 19
      selector:
        number:
          min: 1
          max: 31
          mode: box

get_home_battery_energy_flow:
  name: Get home battery energy flow
  description: Retrieves the home battery energy-flow timeseries and aggregated totals (battery charge/discharge, solar, house, grid). Scope is chosen by which fields you provide - year + month + day for a day, year + month for a month, year alone for a whole year. No fields returns today.
  fields:
    year:
      name: Year
      description: Year (e.g. 2026). Required when month or day are provided.
      example: 2026
      selector:
        number:
          min: 2020
          max: 2100
          mode: box
    month:
      name: Month
      description: Month (1-12). Requires year.
      example: 4
      selector:
        number:
          min: 1
          max: 12
          mode: box
    day:
      name: Day
      description: Day of month (1-31). Requires year and month.
      example: 19
      selector:
        number:
          min: 1
          max: 31
          mode: box

get_home_battery_savings:
  name: Get home battery savings
  description: Retrieves the home battery savings timeseries and aggregated totals (home battery, solar, imbalance and total savings in cents incl/excl VAT). Scope is chosen by which fields you provide - year + month for a month (daily granularity), year alone for a whole year (monthly granularity). No fields returns the current month.
  fields:
    year:
      name: Year
      description: Year (e.g. 2026). Required when month is provided.
      example: 2026
      selector:
        number:
          min: 2020
          max: 2100
          mode: box
    month:
      name: Month
      description: Month (1-12). Requires year.
      example: 5
      selector:
        number:
          min: 1
          max: 12
          mode: box

get_energy_prices:
  name: Get energy prices
  description: Retrieves tariff prices from the Quatt Energy portal (mijnenergie.quatt.io). The period selects whether you get a day's quarter-hourly prices, a month's daily prices or a year's monthly prices. Without year/month/day the current period is used (today for day, the current month for month/year).
  fields:
    period:
      name: Period
      description: Granularity of the returned price series.
      default: "day"
      example: "day"
      selector:
        select:
          options:
            - "day"
            - "month"
            - "year"
    product:
      name: Product
      description: Whether to fetch electricity or gas prices.
      default: "electricity"
      example: "electricity"
      selector:
        select:
          options:
            - "electricity"
            - "gas"
    year:
      name: Year
      description: Year (e.g. 2026). Defaults to the current year.
      example: 2026
      selector:
        number:
          min: 2020
          max: 2100
          mode: box
    month:
      name: Month
      description: Month (1-12). Defaults to the current month.
      example: 5
      selector:
        number:
          min: 1
          max: 12
          mode: box
    day:
      name: Day
      description: Day of month (1-31). Only used for period=day; defaults to today.
      example: 11
      selector:
        number:
          min: 1
          max: 31
          mode: box

get_energy_power:
  name: Get energy power
  description: Retrieves electricity or gas usage from the Quatt Energy portal. Scope is chosen by which fields you provide - year + month + day for an hourly drilldown of that day, year alone (or no fields) for the full-year monthly aggregate.
  fields:
    product:
      name: Product
      description: Whether to fetch electricity or gas usage.
      default: "electricity"
      example: "electricity"
      selector:
        select:
          options:
            - "electricity"
            - "gas"
    year:
      name: Year
      description: Year (e.g. 2026). Defaults to the current year.
      example: 2026
      selector:
        number:
          min: 2020
          max: 2100
          mode: box
    month:
      name: Month
      description: Month (1-12). Requires day for an hourly drilldown.
      example: 5
      selector:
        number:
          min: 1
          max: 12
          mode: box
    day:
      name: Day
      description: Day of month (1-31). Together with month switches to the hourly drilldown.
      example: 11
      selector:
        number:
          min: 1
          max: 31
          mode: box

get_energy_costs:
  name: Get energy costs
  description: Retrieves electricity or gas costs from the Quatt Energy portal. Scope is chosen by which fields you provide - year + month + day for an hourly drilldown of that day, year alone (or no fields) for the full-year monthly aggregate.
  fields:
    product:
      name: Product
      description: Whether to fetch electricity or gas costs.
      default: "electricity"
      example: "electricity"
      selector:
        select:
          options:
            - "electricity"
            - "gas"
    year:
      name: Year
      description: Year (e.g. 2026). Defaults to the current year.
      example: 2026
      selector:
        number:
          min: 2020
          max: 2100
          mode: box
    month:
      name: Month
      description: Month (1-12). Requires day for an hourly drilldown.
      example: 5
      selector:
        number:
          min: 1
          max: 12
          mode: box
    day:
      name: Day
      description: Day of month (1-31). Together with month switches to the hourly drilldown.
      example: 11
      selector:
        number:
          min: 1
          max: 31
          mode: box
