alias: Energy Prices (day / month / year - refresh every 15 minutes)
description: >-
  Refreshes Quatt Energy price sensors for three scopes: today (period=day),
  current month (period=month) and current year (period=year). The portal
  publishes prices roughly once per day so a 15-minute cadence is plenty.
triggers:
  - trigger: time_pattern
    minutes: "/15"
  - trigger: homeassistant
    event: start
conditions: []
actions:
  - variables:
      scopes_to_fetch:
        - Day
        - Month
        - Year
  - repeat:
      for_each: "{{ scopes_to_fetch }}"
      sequence:
        - variables:
            scope: "{{ repeat.item }}"
            fetch_period: "{{ scope | lower }}"
            fetch_year: "{{ now().year }}"
            fetch_month: >-
              {% if scope in ['Day', 'Month'] %}{{ now().month }}{% else
              %}{{ none }}{% endif %}
            fetch_day: >-
              {% if scope == 'Day' %}{{ now().day }}{% else %}{{ none }}{% endif %}
            prices_entity_id: |-
              {% if scope == 'Day' %}
                sensor.quatt_energy_prices_day
              {% elif scope == 'Month' %}
                sensor.quatt_energy_prices_month
              {% elif scope == 'Year' %}
                sensor.quatt_energy_prices_year
              {% endif %}
            prices_valid: false
        - alias: Repeat max 3 times or data is valid
          repeat:
            until:
              - condition: template
                value_template: "{{ repeat.index >= 3 or prices_valid }}"
            sequence:
              - action: quatt.get_energy_prices
                metadata: {}
                data: >-
                  {% set d = {"period": fetch_period} %}
                  {% if fetch_year is not none %}{% set d = dict(d, year=fetch_year) %}{% endif %}
                  {% if fetch_month is not none %}{% set d = dict(d, month=fetch_month) %}{% endif %}
                  {% if fetch_day is not none %}{% set d = dict(d, day=fetch_day) %}{% endif %}
                  {{ d }}
                response_variable: prices_response
              - variables:
                  prices_valid: >
                    {% set json_data = prices_response | default({}, true) %}
                    {{ json_data | length > 0 and 'error' not in json_data }}
              - alias: Update sensor when data is valid
                if:
                  - condition: template
                    value_template: "{{ prices_valid }}"
                then:
                  - action: python_script.set_energy_prices
                    data:
                      entity_id: "{{ prices_entity_id }}"
                      prices: "{{ prices_response | tojson }}"
                      new_state: "{{ now().isoformat() }}"
                else:
                  - delay:
                      milliseconds: 250
        - delay:
            milliseconds: 750
mode: single
trace:
  stored_traces: 10
