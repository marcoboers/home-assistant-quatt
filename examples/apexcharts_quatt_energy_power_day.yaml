type: custom:apexcharts-card
graph_span: 24h
span:
  start: day
  offset: "-2d"
update_interval: 15m
header:
  show: true
  title: Stroomverbruik per uur (eergisteren)
  show_states: true
  colorize_states: true
apex_config:
  chart:
    toolbar:
      show: false
  plotOptions:
    bar:
      columnWidth: 0%
  xaxis:
    tooltip:
      enabled: false
    type: datetime
    tickAmount: 12
    labels:
      formatter: |
        EVAL:(value) => {
          const ts = typeof value === 'number' ? value : Date.parse(value);
          const d = new Date(ts);
          if (d.getMinutes() !== 0) return '';
          return d.getHours().toString().padStart(2, '0') + ':00';
        }
  yaxis:
    labels:
      formatter: |
        EVAL:(value) => Number(value).toFixed(1) + ' kWh'
  tooltip:
    x:
      formatter: |
        EVAL:(value) => {
          const ts = typeof value === 'number' ? value : Date.parse(value);
          const d = new Date(ts);
          const end = new Date(ts + 60 * 60 * 1000);
          const fmt = (x) => x.toLocaleTimeString('nl-NL', {
            hour: '2-digit', minute: '2-digit', hour12: false,
          });
          return fmt(d) + ' - ' + fmt(end);
        }
    "y":
      formatter: |
        EVAL:(value) => {
          if (value == null) return '-';
          return Number(value).toFixed(2).replace('.', ',') + ' kWh';
        }
series:
  - entity: sensor.quatt_energy_power_day
    name: Verbruik
    type: column
    color: "#888888"
    stroke_width: 4
    show:
      in_chart: true
      in_header: false
      legend_value: false
    data_generator: |
      const raw = entity.attributes.power_json;
      if (!raw) return [];
      let d;
      try { d = JSON.parse(raw); } catch { return []; }
      const pts = (d.dial_total && d.dial_total.data) || [];
      if (!pts.length) return [];
      const ys = pts.map(p => p.y);
      const minY = Math.min(...ys);
      const maxY = Math.max(...ys);
      return pts.map(p => {
        const ts = new Date(String(p.date).replace(' ', 'T')).getTime();
        if (p.y === minY || p.y === maxY) return [ts, null];
        return [ts, Number(p.y.toFixed(3))];
      });
  - entity: sensor.quatt_energy_power_day
    name: Laagst
    type: column
    color: "#27ae60"
    stroke_width: 4
    show:
      in_chart: true
      in_header: false
      legend_value: false
    data_generator: |
      const raw = entity.attributes.power_json;
      if (!raw) return [];
      let d;
      try { d = JSON.parse(raw); } catch { return []; }
      const pts = (d.dial_total && d.dial_total.data) || [];
      if (!pts.length) return [];
      const minY = Math.min(...pts.map(p => p.y));
      return pts.map(p => {
        const ts = new Date(String(p.date).replace(' ', 'T')).getTime();
        if (p.y !== minY) return [ts, null];
        return [ts, Number(p.y.toFixed(3))];
      });
  - entity: sensor.quatt_energy_power_day
    name: Hoogst
    type: column
    color: "#e74c3c"
    stroke_width: 4
    show:
      in_chart: true
      in_header: false
      legend_value: false
    data_generator: |
      const raw = entity.attributes.power_json;
      if (!raw) return [];
      let d;
      try { d = JSON.parse(raw); } catch { return []; }
      const pts = (d.dial_total && d.dial_total.data) || [];
      if (!pts.length) return [];
      const maxY = Math.max(...pts.map(p => p.y));
      return pts.map(p => {
        const ts = new Date(String(p.date).replace(' ', 'T')).getTime();
        if (p.y !== maxY) return [ts, null];
        return [ts, Number(p.y.toFixed(3))];
      });
  - entity: sensor.quatt_energy_power_day
    name: netto
    unit: kWh
    color: "#3498db"
    show:
      in_chart: false
      in_header: true
      legend_value: false
    float_precision: 2
    data_generator: |
      const raw = entity.attributes.power_json;
      if (!raw) return [[Date.now(), 0]];
      let d;
      try { d = JSON.parse(raw); } catch { return [[Date.now(), 0]]; }
      const v = (d.totals && d.totals.dayAmount) || 0;
      return [[Date.now(), Number(v.toFixed(3))]];
  - entity: sensor.quatt_energy_power_day
    name: laagst
    unit: kWh
    color: "#27ae60"
    show:
      in_chart: false
      in_header: true
      legend_value: false
    float_precision: 2
    data_generator: |
      const raw = entity.attributes.power_json;
      if (!raw) return [[Date.now(), 0]];
      let d;
      try { d = JSON.parse(raw); } catch { return [[Date.now(), 0]]; }
      const pts = (d.dial_total && d.dial_total.data) || [];
      if (!pts.length) return [[Date.now(), 0]];
      const m = pts.reduce((a, b) => a.y < b.y ? a : b);
      return [[Date.now(), Number(m.y.toFixed(3))]];
  - entity: sensor.quatt_energy_power_day
    name: hoogst
    unit: kWh
    color: "#e74c3c"
    show:
      in_chart: false
      in_header: true
      legend_value: false
    float_precision: 2
    data_generator: |
      const raw = entity.attributes.power_json;
      if (!raw) return [[Date.now(), 0]];
      let d;
      try { d = JSON.parse(raw); } catch { return [[Date.now(), 0]]; }
      const pts = (d.dial_total && d.dial_total.data) || [];
      if (!pts.length) return [[Date.now(), 0]];
      const m = pts.reduce((a, b) => a.y > b.y ? a : b);
      return [[Date.now(), Number(m.y.toFixed(3))]];
