type: custom:apexcharts-card
graph_span: 31d
span:
  start: month
update_interval: 5m
header:
  show: true
  title: Stroomprijs deze maand
  show_states: true
  colorize_states: true
apex_config:
  chart:
    toolbar:
      show: false
  plotOptions:
    bar:
      columnWidth: 95%
  xaxis:
    tooltip:
      enabled: false
    type: datetime
    tickAmount: 10
    labels:
      formatter: |
        EVAL:(value) => {
          const ts = typeof value === 'number' ? value : Date.parse(value);
          const d = new Date(ts);
          const base = new Date();
          if (d.getMonth() !== base.getMonth() || d.getFullYear() !== base.getFullYear()) return '';
          return d.getDate().toString();
        }
  yaxis:
    labels:
      formatter: |
        EVAL:(value) => '€ ' + Number(value).toFixed(2)
  tooltip:
    x:
      formatter: |
        EVAL:(value) => {
          const ts = typeof value === 'number' ? value : Date.parse(value);
          const d = new Date(ts);
          const s = d.toLocaleDateString('nl-NL', {
            weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
          });
          return s.charAt(0).toUpperCase() + s.slice(1);
        }
    "y":
      formatter: |
        EVAL:(value) => {
          if (value == null) return '-';
          return '€ ' + Number(value).toFixed(4).replace('.', ',') + ' / kWh';
        }
series:
  - entity: sensor.quatt_energy_prices_month
    name: Gemiddelde
    type: line
    color: "#3498db"
    stroke_width: 2
    curve: straight
    show:
      in_chart: true
      in_header: false
      legend_value: false
    data_generator: |
      const raw = entity.attributes.prices_json;
      if (!raw) return [];
      let d;
      try { d = JSON.parse(raw); } catch { return []; }
      const avg = (d.pricesAvg && d.pricesAvg.priceAvg) || 0;
      const pts = (d.prices && d.prices.data) || [];
      if (!pts.length) return [];
      const tsOf = (s, h, mi, se) => {
        const [y, m, dd] = String(s).split('-').map(Number);
        return new Date(y, m - 1, dd, h, mi, se).getTime();
      };
      const first = tsOf(pts[0].date, 0, 0, 0);
      const last = tsOf(pts[pts.length - 1].date, 23, 59, 59);
      return [[first, Number(avg.toFixed(4))], [last, Number(avg.toFixed(4))]];
  - entity: sensor.quatt_energy_prices_month
    name: Prijs
    type: column
    color: "#888888"
    stroke_width: 4
    show:
      in_chart: true
      in_header: false
      legend_value: false
    data_generator: |
      const raw = entity.attributes.prices_json;
      if (!raw) return [];
      let d;
      try { d = JSON.parse(raw); } catch { return []; }
      const pts = (d.prices && d.prices.data) || [];
      const valid = pts.filter(p => p && p.date && p.price_type === 'positive');
      if (!valid.length) return [];
      const ys = valid.map(p => p.y);
      const minY = Math.min(...ys);
      const maxY = Math.max(...ys);
      const tsOf = (s) => {
        const [y, m, dd] = String(s).split('-').map(Number);
        return new Date(y, m - 1, dd, 12, 0, 0).getTime();
      };
      return pts.map(p => {
        const ts = tsOf(p.date);
        if (p.price_type !== 'positive') return [ts, null];
        if (p.y === minY || p.y === maxY) return [ts, null];
        return [ts, Number(p.y.toFixed(4))];
      });
  - entity: sensor.quatt_energy_prices_month
    name: Goedkoopste dag
    type: column
    color: "#27ae60"
    stroke_width: 4
    show:
      in_chart: true
      in_header: false
      legend_value: false
    data_generator: |
      const raw = entity.attributes.prices_json;
      if (!raw) return [];
      let d;
      try { d = JSON.parse(raw); } catch { return []; }
      const pts = (d.prices && d.prices.data) || [];
      const valid = pts.filter(p => p && p.date && p.price_type === 'positive');
      if (!valid.length) return [];
      const minY = Math.min(...valid.map(p => p.y));
      const tsOf = (s) => {
        const [y, m, dd] = String(s).split('-').map(Number);
        return new Date(y, m - 1, dd, 12, 0, 0).getTime();
      };
      return pts.map(p => {
        const ts = tsOf(p.date);
        if (p.price_type !== 'positive' || p.y !== minY) return [ts, null];
        return [ts, Number(p.y.toFixed(4))];
      });
  - entity: sensor.quatt_energy_prices_month
    name: Duurste dag
    type: column
    color: "#e74c3c"
    stroke_width: 4
    show:
      in_chart: true
      in_header: false
      legend_value: false
    data_generator: |
      const raw = entity.attributes.prices_json;
      if (!raw) return [];
      let d;
      try { d = JSON.parse(raw); } catch { return []; }
      const pts = (d.prices && d.prices.data) || [];
      const valid = pts.filter(p => p && p.date && p.price_type === 'positive');
      if (!valid.length) return [];
      const maxY = Math.max(...valid.map(p => p.y));
      const tsOf = (s) => {
        const [y, m, dd] = String(s).split('-').map(Number);
        return new Date(y, m - 1, dd, 12, 0, 0).getTime();
      };
      return pts.map(p => {
        const ts = tsOf(p.date);
        if (p.price_type !== 'positive' || p.y !== maxY) return [ts, null];
        return [ts, Number(p.y.toFixed(4))];
      });
  - entity: sensor.quatt_energy_prices_month
    name: gemiddeld
    unit: € / kWh
    color: "#3498db"
    show:
      in_chart: false
      in_header: true
      legend_value: false
    float_precision: 4
    data_generator: |
      const raw = entity.attributes.prices_json;
      if (!raw) return [[Date.now(), 0]];
      let d;
      try { d = JSON.parse(raw); } catch { return [[Date.now(), 0]]; }
      return [[Date.now(), Number(((d.pricesAvg && d.pricesAvg.priceAvg) || 0).toFixed(4))]];
  - entity: sensor.quatt_energy_prices_month
    name: laagste dag
    unit: € / kWh
    color: "#27ae60"
    show:
      in_chart: false
      in_header: true
      legend_value: false
    float_precision: 4
    data_generator: |
      const raw = entity.attributes.prices_json;
      if (!raw) return [[Date.now(), 0]];
      let d;
      try { d = JSON.parse(raw); } catch { return [[Date.now(), 0]]; }
      const pts = ((d.prices && d.prices.data) || []).filter(p => p && p.price_type === 'positive');
      if (!pts.length) return [[Date.now(), 0]];
      const m = pts.reduce((a, b) => a.y < b.y ? a : b);
      return [[Date.now(), Number(m.y.toFixed(4))]];
  - entity: sensor.quatt_energy_prices_month
    name: hoogste dag
    unit: € / kWh
    color: "#e74c3c"
    show:
      in_chart: false
      in_header: true
      legend_value: false
    float_precision: 4
    data_generator: |
      const raw = entity.attributes.prices_json;
      if (!raw) return [[Date.now(), 0]];
      let d;
      try { d = JSON.parse(raw); } catch { return [[Date.now(), 0]]; }
      const pts = ((d.prices && d.prices.data) || []).filter(p => p && p.price_type === 'positive');
      if (!pts.length) return [[Date.now(), 0]];
      const m = pts.reduce((a, b) => a.y > b.y ? a : b);
      return [[Date.now(), Number(m.y.toFixed(4))]];
