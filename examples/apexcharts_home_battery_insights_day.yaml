type: custom:apexcharts-card
graph_span: 24h
span:
  start: day
update_interval: 1m
header:
  show: true
  title: Batterij laadtoestand vandaag
  show_states: true
  colorize_states: true
yaxis:
  - id: percent
    decimals: 0
    min: 0
    max: 100
apex_config:
  chart:
    toolbar:
      show: false
  stroke:
    curve: stepline
    width: 2
  markers:
    size: 0
    hover:
      size: 4
  xaxis:
    tooltip:
      enabled: false
    type: datetime
    tickAmount: 12
    labels:
      formatter: |
        EVAL:(value, timestamp, opts) => {
          const h = (new Date(value)).getHours();
          if (h === 0 && value > Date.now()) {
            return '';
          }
          return h.toString();
        }
  tooltip:
    x:
      formatter: |
        EVAL:(value) => {
          const d = new Date(value);

          const dateStr = d.toLocaleDateString('nl-NL', {
            weekday: 'long',
            day: 'numeric',
            month: 'long',
            year: 'numeric',
          });

          const timeStr = d.toLocaleTimeString('nl-NL', {
            hour: '2-digit',
            minute: '2-digit',
            hour12: false,
          });

          const niceDate = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
          return `${niceDate} ${timeStr}`;
        }
    "y":
      formatter: |
        EVAL:(value, { seriesIndex, dataPointIndex, w }) => {
          const now = Date.now();
          const x = w?.globals?.seriesX?.[seriesIndex]?.[dataPointIndex];
          if (typeof x === 'number' && x > now) return '';

          const labels = {
            balancingTheGrid: 'Balanceren met netwerk',
            chargingCheapEnergy: 'Goedkoop laden',
            waitingToDischarge: 'Wachten met ontladen',
          };
          const action = (typeof x === 'number')
            ? (window.__quatt_charge_actions || {})[x]
            : null;
          const actionLabel = action ? (labels[action] || action) : '';
          const pct = Number(value).toFixed(0) + '%';
          return actionLabel ? `${pct} — ${actionLabel}` : pct;
        }
series:
  - entity: sensor.quatt_home_battery_insights_today
    name: Laadtoestand
    type: line
    yaxis_id: percent
    color: "#27ae60"
    stroke_width: 2
    float_precision: 0
    show:
      in_chart: true
      in_header: false
      legend_value: false
    data_generator: |
      const raw = entity.attributes.insights_json;
      if (!raw) return [];

      let data;
      try {
        data = JSON.parse(raw);
      } catch {
        return [];
      }

      const points = (data.result || [])
        .slice()
        .sort((a, b) =>
          new Date(a.timestamp).getTime() - new Date(b.timestamp).getTime()
        );

      // Stash controlAction per timestamp so the tooltip y-formatter can
      // look it up (the formatter only receives x/y, not the raw point).
      window.__quatt_charge_actions = {};
      points.forEach(p => {
        const t = new Date(p.timestamp).getTime();
        window.__quatt_charge_actions[t] = p.controlAction || null;
      });

      return points.map(p => [
        new Date(p.timestamp).getTime(),
        Math.max(0, Math.min(100, Number(p.chargeState) || 0)),
      ]);
  - entity: sensor.quatt_home_battery_insights_today
    name: laadtoestand
    unit: "%"
    yaxis_id: percent
    color: "#27ae60"
    show:
      in_chart: false
      in_header: true
      legend_value: false
    float_precision: 0
    data_generator: |
      const raw = entity.attributes.insights_json;
      if (!raw) return [];

      let data;
      try {
        data = JSON.parse(raw);
      } catch {
        return [];
      }

      const points = (data.result || [])
        .slice()
        .sort((a, b) =>
          new Date(b.timestamp).getTime() - new Date(a.timestamp).getTime()
        );
      const latest = points[0];
      if (!latest) return [];

      return [[
        new Date(latest.timestamp).getTime(),
        Math.max(0, Math.min(100, Number(latest.chargeState) || 0)),
      ]];
