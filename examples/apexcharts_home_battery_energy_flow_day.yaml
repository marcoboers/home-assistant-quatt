type: custom:apexcharts-card
graph_span: 24h
span:
  start: day
stacked: true
update_interval: 1m
header:
  show: true
  title: Energie flow vandaag
  show_states: true
  colorize_states: true
yaxis:
  - id: energy
    decimals: 0
    max: "|+1|"
apex_config:
  chart:
    toolbar:
      show: false
  annotations:
    yaxis:
      - y: 0
        borderColor: "#888888"
        strokeDashArray: 0
        borderWidth: 1
  xaxis:
    tooltip:
      enabled: false
    type: datetime
    tickAmount: 12
    labels:
      formatter: |
        EVAL:(value, timestamp, opts) => {
          const h = (new Date(value)).getHours();
          if (h === 0 && value > Date.now()) {
            return '';
          }
          return h.toString();
        }
  tooltip:
    x:
      formatter: |
        EVAL:(value) => {
          const d = new Date(value);

          const dateStr = d.toLocaleDateString('nl-NL', {
            weekday: 'long',
            day: 'numeric',
            month: 'long',
            year: 'numeric',
          });

          const timeStr = d.toLocaleTimeString('nl-NL', {
            hour: '2-digit',
            minute: '2-digit',
            hour12: false,
          });

          const niceDate = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
          return `${niceDate} ${timeStr}`;
        }
    "y":
      formatter: |
        EVAL:(value, { seriesIndex, dataPointIndex, w }) => {
          const now = Date.now();
          const x = w?.globals?.seriesX?.[seriesIndex]?.[dataPointIndex];
          if (typeof x === 'number' && x > now) return '';

          return Number(value).toFixed(3) + ' kWh';
        }
series:
  - entity: sensor.quatt_home_battery_energy_flow_today
    name: Zonne-energie
    type: line
    yaxis_id: energy
    color: "#f4d03f"
    stroke_width: 2
    float_precision: 3
    show:
      in_chart: true
      in_header: false
      legend_value: false
    data_generator: |
      const raw = entity.attributes.energy_flow_json;
      if (!raw) return [];

      let data;
      try {
        data = JSON.parse(raw);
      } catch {
        return [];
      }

      const points = data.result?.timeseries || [];
      return points.map(p => [
        new Date(p.startAt).getTime(),
        -Math.max(0, Number((p.solarProductionKWh || 0).toFixed(3))),
      ]);
