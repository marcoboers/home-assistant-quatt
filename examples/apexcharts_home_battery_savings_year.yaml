type: custom:apexcharts-card
graph_span: 1y
span:
  start: year
stacked: true
update_interval: 1m
header:
  show: true
  title: Besparing dit jaar
  show_states: true
  colorize_states: true
apex_config:
  chart:
    toolbar:
      show: false
  annotations:
    yaxis:
      - y: 0
        borderColor: "#888888"
        strokeDashArray: 0
        borderWidth: 1
  xaxis:
    tooltip:
      enabled: false
    type: datetime
    tickAmount: 12
    labels:
      formatter: |
        EVAL:(value) => {
          const d = new Date(value);
          return d.toLocaleDateString('nl-NL', { month: 'short' });
        }
  tooltip:
    x:
      formatter: |
        EVAL:(value) => {
          const d = new Date(value);
          const s = d.toLocaleDateString('nl-NL', {
            month: 'long',
            year: 'numeric',
          });
          return s.charAt(0).toUpperCase() + s.slice(1);
        }
    y:
      formatter: |
        EVAL:(value, { seriesIndex, dataPointIndex, w }) => {
          const now = Date.now();
          const x = w?.globals?.seriesX?.[seriesIndex]?.[dataPointIndex];
          if (typeof x === 'number' && x > now) return '';

          return '€ ' + Number(value).toFixed(2);
        }
series:
  - entity: sensor.quatt_home_battery_savings_year
    name: Thuisbatterij
    type: column
    stack_group: savings
    color: "#27ae60"
    float_precision: 2
    show:
      in_chart: true
      in_header: false
      legend_value: false
    data_generator: |
      const raw = entity.attributes.savings_json;
      if (!raw) return [];

      let data;
      try {
        data = JSON.parse(raw);
      } catch {
        return [];
      }

      const points = data.result?.timeseries || [];
      return points.map(p => [
        new Date(p.startAt).getTime(),
        Number(((p.homeBatterySavingsCentsInclVat || 0) / 100).toFixed(2)),
      ]);
